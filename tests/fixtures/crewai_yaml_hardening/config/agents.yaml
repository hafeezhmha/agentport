defaults: &agent_defaults
  backstory: >
    You keep a strict audit trail across source evidence,
    assumptions, and unresolved migration risks.
  llm: gpt-4o-mini
  tools:
    - SerperDevTool

researcher:
  <<: *agent_defaults
  role: >
    Evidence Researcher
  goal: |
    Find source-backed framework migration evidence.
    Separate identity fields from runtime behavior.
  knowledge_sources:
    - docs/frameworks.md

reviewer:
  <<: *agent_defaults
  role: Runtime Reviewer
  goal: Identify fields that need manual runtime validation.
